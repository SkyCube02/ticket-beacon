services:
  - type: web
    name: ticket-beacon-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-beacon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: AZURE_CLIENT_ID
        value: ""
      - key: AZURE_TENANT_ID
        value: ""
      - key: FRONTEND_URL
        value: https://ticket-beacon.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://ticket-beacon.vercel.app

databases:
  - name: ticket-beacon-db
    databaseName: ticket_beacon
    plan: free
